name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.6.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun test
      - run: bun run qa:docs-negative
      - run: bun run test:types
      - run: bun run build
      - name: Validate source installer against generated release
        run: |
          set -eu
          test ! -e release
          bun run release:build --no-write-installer
          bun run installer:check
      - run: sh -n install.sh
      - run: docker run --rm -v "$PWD:/work:ro" -w /work koalaman/shellcheck-alpine:v0.11.0 shellcheck install.sh
      - run: docker run --rm -v "$PWD:/work:ro" -w /work rhysd/actionlint:1.7.11 -color .github/workflows/ci.yml .github/workflows/release.yml .github/workflows/pages.yml
      - run: cargo test --manifest-path installer-manager/Cargo.toml
      - run: cargo fmt --manifest-path installer-manager/Cargo.toml -- --check
      - run: cargo clippy --manifest-path installer-manager/Cargo.toml --all-targets -- -D warnings
      - run: cargo build --release --manifest-path installer-manager/Cargo.toml
      - run: bun run qa:installer-negative --evidence .omo/evidence/ci/installer-negative
      - run: bun run qa:installer-manager-races --evidence .omo/evidence/ci/manager-races
      - run: bun run release:verify release
      - run: bun run qa:release-matrix --evidence .omo/evidence/ci/release-matrix
      - run: cd release && sha256sum --check SHA256SUMS

  docs:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - working-directory: docs-site
        run: bun install --frozen-lockfile
      - working-directory: docs-site
        run: bunx playwright install --with-deps chromium
      - working-directory: docs-site
        run: bun run check && bun test
      - working-directory: docs-site
        env:
          SITE: https://abran-labs.github.io
          BASE: /ai-auth-kit/
        run: bun run build && bun run validate:dist && bun run qa:browser
