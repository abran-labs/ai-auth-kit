name: Verified npm release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      source_tag:
        description: Existing immutable source tag to release
        required: true
        type: string
      publish_approval:
        description: Enter I_HAVE_EXPLICIT_FINAL_NPM_APPROVAL only after fresh user approval
        required: true
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: npm-release-${{ github.event_name == 'workflow_dispatch' && inputs.source_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      source_tag: ${{ steps.source.outputs.tag }}
      source_tag_sha: ${{ steps.source.outputs.sha }}
      tarball_filename: ${{ steps.artifact.outputs.filename }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_tag || github.ref }}
          fetch-depth: 0
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - id: source
        name: Verify immutable source tag
        shell: bash
        env:
          INPUT_SOURCE_TAG: ${{ inputs.source_tag }}
          EVENT_NAME: ${{ github.event_name }}
          PUSH_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = workflow_dispatch ]; then tag="$INPUT_SOURCE_TAG"; else tag="$PUSH_TAG"; fi
          git check-ref-format --allow-onelevel "refs/tags/$tag"
          sha=$(git rev-parse --verify "refs/tags/$tag^{commit}")
          test "$(git rev-parse HEAD)" = "$sha"
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$sha" | tee source-tag.sha
          printf 'sha=%s\n' "$sha" >> "$GITHUB_OUTPUT"
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun test
      - run: bun run test:types
      - run: bun run build
      - run: bun run pack:verify
      - id: artifact
        name: Stage exactly one verified package artifact
        shell: bash
        run: |
          set -euo pipefail
          evidence='.omo/evidence/task-3-library-only-npm-release'
          mkdir -p .omo/npm-artifact
          tarball=$(find "$evidence" -maxdepth 1 -type f -name '*.tgz' -printf '%f\n')
          test "$(printf '%s\n' "$tarball" | wc -l)" -eq 1
          cp "$evidence/$tarball" ".omo/npm-artifact/$tarball"
          cp "$evidence/pack.sha256" .omo/npm-artifact/pack.sha256
          cp "$evidence/pack.sri" .omo/npm-artifact/pack.sri
          cp "$evidence/pack.inventory.txt" .omo/npm-artifact/pack.inventory.txt
          cp source-tag.sha .omo/npm-artifact/source-tag.sha
          test "$(find .omo/npm-artifact -maxdepth 1 -type f | wc -l)" -eq 5
          printf 'filename=%s\n' "$tarball" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: npm-package-${{ steps.source.outputs.tag }}-${{ steps.source.outputs.sha }}
          if-no-files-found: error
          retention-days: 7
          path: .omo/npm-artifact

  publish:
    if: github.event_name == 'workflow_dispatch' && inputs.publish_approval == 'I_HAVE_EXPLICIT_FINAL_NPM_APPROVAL'
    needs: package
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: npm-production
    permissions:
      contents: read
      id-token: write
      packages: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.package.outputs.source_tag_sha }}
          fetch-depth: 1
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: npm-package-${{ needs.package.outputs.source_tag }}-${{ needs.package.outputs.source_tag_sha }}
          path: .omo/npm-artifact
      - name: Recheck downloaded artifact and npm authority
        env:
          NPM_CONFIG_PROVENANCE: true
          RELEASE_SOURCE_TAG_SHA: ${{ needs.package.outputs.source_tag_sha }}
          RELEASE_TARBALL: .omo/npm-artifact/${{ needs.package.outputs.tarball_filename }}
          RELEASE_TARBALL_FILENAME: ${{ needs.package.outputs.tarball_filename }}
          RELEASE_TARBALL_INVENTORY: .omo/npm-artifact/pack.inventory.txt
          RELEASE_VERSION: 1.0.0
        shell: bash
        run: |
          set -euo pipefail
          export RELEASE_TARBALL_SHA256="$(cat .omo/npm-artifact/pack.sha256)"
          export RELEASE_TARBALL_SRI="$(cat .omo/npm-artifact/pack.sri)"
          test "$(git rev-parse HEAD)" = "$RELEASE_SOURCE_TAG_SHA"
          test "$(cat .omo/npm-artifact/source-tag.sha)" = "$RELEASE_SOURCE_TAG_SHA"
          bun run release:artifact-verify
      - name: Publish exactly the verified tarball
        env:
          RELEASE_TARBALL: .omo/npm-artifact/${{ needs.package.outputs.tarball_filename }}
        run: npm publish "$RELEASE_TARBALL" --access public --provenance
