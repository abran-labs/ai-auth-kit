name: Publish immutable release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing protected vX.Y.Z tag to release
        required: true
        type: string
      confirm_release:
        description: Confirm signing and publishing this exact protected tag
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-tag:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      version: ${{ steps.package.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.release_tag }}
          fetch-depth: 1
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - id: package
        run: |
          set -eu
          TAG="${{ inputs.release_tag }}"
          test "${{ inputs.confirm_release }}" = true
          grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$' <<EOF
          $TAG
          EOF
          VERSION=${TAG#v}
          test "$VERSION" = "$(bun -e 'process.stdout.write((await Bun.file("package.json").json()).version)')"
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
  build:
    needs: validate-tag
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.release_tag }}
          fetch-depth: 1
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run check && bun test && bun run test:types && bun run build
      - run: cargo test --manifest-path installer-manager/Cargo.toml
      - run: cargo fmt --manifest-path installer-manager/Cargo.toml -- --check
      - run: cargo clippy --manifest-path installer-manager/Cargo.toml --all-targets -- -D warnings
      - run: cargo build --release --manifest-path installer-manager/Cargo.toml
      - run: bun run qa:installer-negative --evidence .omo/evidence/release/installer-negative
      - run: bun run qa:installer-manager-races --evidence .omo/evidence/release/manager-races
      - name: Build exact release bytes
        run: |
          set -eu
          test ! -e release
          bun run release:build --no-write-installer --release-version "${{ inputs.release_tag }}"
          bun run installer:check
          sh -n install.sh
          bun run release:verify release
          bun run qa:release-matrix --evidence .omo/evidence/release/matrix
          (cd release && sha256sum --check SHA256SUMS)
          cp install.sh LICENSE release/
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ github.sha }}
          if-no-files-found: error
          retention-days: 1
          path: release
  attest:
    needs: [validate-tag, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-${{ github.sha }}
          path: release
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: release/*
  verify-attestation:
    needs: [validate-tag, attest]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: release
    permissions:
      contents: read
      attestations: read
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-${{ github.sha }}
          path: release
      - name: Verify GitHub provenance then sign the manager bundle
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          INSTALLER_MANAGER_SIGNING_KEY: ${{ secrets.INSTALLER_MANAGER_SIGNING_KEY }}
        run: |
          set -eu
          for artifact in release/ai-auth-kit-*; do
            gh attestation verify "$artifact" --repo abran-labs/ai-auth-kit --predicate-type https://slsa.dev/provenance/v1 --signer-workflow .github/workflows/release.yml
          done
          bun run release:sign-bundle release
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: verified-release-${{ github.sha }}
          if-no-files-found: error
          retention-days: 1
          path: release
  publish:
    needs: [validate-tag, verify-attestation]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: verified-release-${{ github.sha }}
          path: release
      - name: Publish only a previously absent immutable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          gh release view "${{ inputs.release_tag }}" >/dev/null 2>&1 && { printf '%s\n' 'refusing existing release' >&2; exit 1; }
          # Repository immutable-release protection is a prerequisite for this workflow.
          gh release create "${{ inputs.release_tag }}" release/* --verify-tag --generate-notes --title "${{ inputs.release_tag }}"
